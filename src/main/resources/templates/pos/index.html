<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: layout(pageTitle='POS - Kasir', activePage='pos', content=~{::main-content}, extraScripts=~{::scripts})}">

<head></head>

<body>

    <main th:fragment="main-content">
        <!-- Page Header -->
        <div class="page-header" style="margin-bottom:16px">
            <div class="page-header-info">
                <div class="breadcrumb">
                    <a th:href="@{/dashboard}">🏠 Dashboard</a> <span class="breadcrumb-sep">›</span> <span>Point of
                        Sale</span>
                </div>
                <h2>🛒 Point of Sale (POS)</h2>
            </div>
            <div class="d-flex gap-2 align-center">
                <span id="live-date" style="font-size:13px;color:var(--text-muted)"></span>
            </div>
        </div>

        <!-- POS LAYOUT -->
        <div class="pos-layout">

            <!-- LEFT: Product Browse + Barcode -->
            <div class="pos-left">

                <!-- Barcode Scanner -->
                <div class="pos-barcode-input">
                    <span style="font-size:24px">📷</span>
                    <div style="flex:1">
                        <label
                            style="font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px">SCAN
                            BARCODE / KETIK MANUAL</label>
                        <input type="text" id="barcode-input" placeholder="Scan atau ketik barcode, tekan Enter..."
                            autocomplete="off" autofocus>
                    </div>
                    <button class="btn btn-success"
                        onclick="POS.lookupByBarcode(document.getElementById('barcode-input').value.trim()); document.getElementById('barcode-input').value=''">
                        ↵ Tambah
                    </button>
                </div>

                <!-- Product Search & Grid -->
                <div class="card" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
                    <div class="card-header">
                        <div class="card-title">📦 Produk Tersedia</div>
                        <div class="search-box">
                            <span class="search-box-icon">🔍</span>
                            <input type="text" id="product-search" placeholder="Cari produk...">
                        </div>
                    </div>
                    <div style="padding:16px;overflow-y:auto;flex:1">
                        <div class="product-grid" id="product-grid">
                            <div th:each="product : ${products}" th:if="${product.stock > 0}" class="product-card"
                                th:data-id="${product.id}" th:data-barcode="${product.barcode}"
                                th:data-name="${product.name}" th:data-sell-price="${product.sellPrice}"
                                th:data-buy-price="${product.buyPrice}" th:data-stock="${product.stock}"
                                th:data-unit="${product.unit}"
                                onclick="POS.addToCart({id: parseInt(this.getAttribute('data-id')), barcode: this.getAttribute('data-barcode'), name: this.getAttribute('data-name'), sellPrice: parseFloat(this.getAttribute('data-sell-price')), buyPrice: parseFloat(this.getAttribute('data-buy-price')), stock: parseInt(this.getAttribute('data-stock')), unit: this.getAttribute('data-unit')})">
                                <div class="product-card-icon">📦</div>
                                <div class="product-card-name" th:text="${product.name}">Produk</div>
                                <div class="product-card-price"
                                    th:text="'Rp ' + ${#numbers.formatDecimal(product.sellPrice, 1, 'COMMA', 0, 'POINT')}">
                                    Rp 0</div>
                                <div class="product-card-stock"
                                    th:text="'Stok: ' + ${product.stock} + ' ' + ${product.unit}">0 pcs</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Shopping Cart -->
            <div class="pos-right">
                <div class="cart-header">
                    <div class="cart-title">🛒 Keranjang (<span id="cart-count">0</span>)</div>
                    <button class="btn btn-ghost btn-sm" onclick="POS.clearCart()">🗑 Hapus Semua</button>
                </div>

                <!-- Cart Items -->
                <div class="cart-items" id="cart-items">
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <p>Keranjang kosong</p>
                        <small>Scan barcode atau klik produk</small>
                    </div>
                </div>

                <!-- Totals -->
                <div class="cart-totals">
                    <div class="cart-total-row">
                        <span class="text-muted">Subtotal (<span id="item-count">0</span> item)</span>
                        <span id="cart-subtotal">Rp 0</span>
                    </div>
                    <div class="cart-total-row">
                        <span class="text-muted">Diskon</span>
                        <div class="d-flex align-center gap-2">
                            <input type="number" id="discount-input" value="0" min="0"
                                style="width:80px;padding:4px 8px;border:1.5px solid var(--gray-300);border-radius:6px;font-size:12px;text-align:right"
                                oninput="POS.updateTotals()">
                        </div>
                    </div>
                    <div class="cart-total-row grand">
                        <span>TOTAL</span>
                        <span id="cart-total">Rp 0</span>
                    </div>
                </div>

                <!-- Payment Section -->
                <div style="padding:12px 20px;background:var(--gray-100);border-top:1px solid var(--gray-200)">
                    <div class="form-group" style="margin-bottom:10px">
                        <label class="form-label">Metode Pembayaran</label>
                        <select class="form-control" id="payment-method">
                            <option value="CASH">💵 Tunai (Cash)</option>
                            <option value="DEBIT">💳 Debit/ATM</option>
                            <option value="QRIS">📱 QRIS</option>
                            <option value="TRANSFER">🏦 Transfer Bank</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:10px">
                        <label class="form-label">Uang Diterima (Rp)</label>
                        <input type="number" class="form-control" id="paid-amount" placeholder="0" min="0"
                            oninput="POS.calculateChange()" style="font-size:16px;font-weight:700;text-align:right">
                    </div>
                    <div class="cart-total-row" style="margin-bottom:10px">
                        <span class="text-muted">Kembalian:</span>
                        <span id="change-amount" style="font-weight:800;font-size:16px;color:var(--success)">Rp 0</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="cart-actions">
                    <button class="btn btn-success btn-lg" id="pay-btn" onclick="POS.processPayment()">
                        💳 Bayar
                    </button>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                        <input type="text" id="sale-notes" class="form-control" placeholder="📝 Catatan...">
                        <button class="btn btn-ghost" onclick="POS.clearCart()">🗑 Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SUCCESS MODAL -->
        <div class="modal-overlay" id="success-modal">
            <div class="modal" style="max-width:400px">
                <div class="modal-header"
                    style="background:linear-gradient(135deg,var(--accent),var(--success));border-radius:var(--radius-xl) var(--radius-xl) 0 0">
                    <div class="modal-title" style="color:white;font-size:18px">✅ Transaksi Berhasil!</div>
                </div>
                <div class="modal-body" style="text-align:center">
                    <div style="font-size:48px;margin-bottom:12px">🎉</div>
                    <div
                        style="background:var(--background);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;text-align:left">
                        <div class="cart-total-row"><span class="text-muted">No. Invoice:</span><span
                                id="result-invoice" style="font-weight:700"></span></div>
                        <div class="cart-total-row"><span class="text-muted">Total:</span><span id="result-total"
                                style="font-weight:700;color:var(--accent)"></span></div>
                        <div class="cart-total-row"><span class="text-muted">Dibayar:</span><span id="result-paid"
                                style="font-weight:700"></span></div>
                        <div class="cart-total-row"
                            style="border-top:2px solid var(--gray-200);margin-top:8px;padding-top:8px"><span
                                class="text-muted">Kembalian:</span><span id="result-change"
                                style="font-weight:800;font-size:18px;color:var(--success)"></span></div>
                    </div>
                </div>
                <div class="modal-footer" style="justify-content:center;gap:10px">
                    <a id="receipt-link" href="#" target="_blank" class="btn btn-success">🧾 Cetak Struk</a>
                    <button class="btn btn-primary" onclick="Modal.close('success-modal')">Transaksi Baru</button>
                </div>
            </div>
        </div>

    </main>

    <th:block th:fragment="scripts">
        <script th:src="@{/js/pos.js}"></script>
        <script th:inline="javascript">
            const rawProducts = /*[[${products}]]*/ [];
            const productsData = rawProducts.filter(p => p.stock > 0).map(p => ({
                id: p.id,
                barcode: p.barcode,
                name: p.name,
                sellPrice: p.sellPrice,
                buyPrice: p.buyPrice,
                stock: p.stock,
                unit: p.unit
            }));
            POS.init(productsData);

            // Live date
            document.getElementById('live-date').textContent = new Date().toLocaleDateString('id-ID', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        </script>
    </th:block>

</body>

</html>
