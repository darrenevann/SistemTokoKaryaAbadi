<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(pageTitle=${product.id == null ? 'Tambah Produk' : 'Edit Produk'}, activePage='products', content=~{::main-content}, extraScripts=~{::scripts})}">
<head></head>
<body>

<main th:fragment="main-content">
    <div class="page-header">
        <div class="page-header-info">
            <div class="breadcrumb">
                <a th:href="@{/dashboard}">🏠 Dashboard</a>
                <span class="breadcrumb-sep">›</span>
                <a th:href="@{/products}">Master Barang</a>
                <span class="breadcrumb-sep">›</span>
                <span th:text="${product.id == null ? 'Tambah Produk' : 'Edit Produk'}">Form</span>
            </div>
            <h2 th:text="${product.id == null ? '➕ Tambah Produk Baru' : '✏️ Edit Produk'}">Tambah Produk</h2>
        </div>
        <a th:href="@{/products}" class="btn btn-ghost">← Kembali</a>
    </div>

    <div style="max-width: 680px;">
        <div class="card">
            <div class="card-header">
                <div class="card-title">📦 Informasi Produk</div>
            </div>
            <div class="card-body">
                <form th:action="${product.id == null ? '/products/add' : '/products/edit/' + product.id}"
                      method="post"
                      th:object="${product}"
                      id="product-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <!-- Barcode -->
                    <div class="form-group">
                        <label class="form-label">Barcode <span style="color:var(--danger)">*</span></label>
                        <div class="input-group">
                            <input type="text" class="form-control" th:field="*{barcode}"
                                   placeholder="Contoh: 8999999820112" required
                                   id="barcode-input">
                            <button type="button" class="btn btn-ghost" onclick="simulateScan()" title="Simulasi Scan">📷</button>
                        </div>
                        <small class="text-muted">Masukkan barcode unik produk (dapat discan)</small>
                    </div>

                    <!-- Nama -->
                    <div class="form-group">
                        <label class="form-label">Nama Produk <span style="color:var(--danger)">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}"
                               placeholder="Contoh: Indomie Goreng" required>
                    </div>

                    <!-- Kategori -->
                    <div class="form-group">
                        <label class="form-label">Kategori <span style="color:var(--danger)">*</span></label>
                        <select class="form-control" th:field="*{category.id}" required>
                            <option value="">-- Pilih Kategori --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${product.category != null and product.category.id == cat.id}">
                                Kategori
                            </option>
                        </select>
                    </div>

                    <div class="grid-2">
                        <!-- Harga Beli -->
                        <div class="form-group">
                            <label class="form-label">Harga Beli (Rp) <span style="color:var(--danger)">*</span></label>
                            <input type="number" class="form-control" th:field="*{buyPrice}"
                                   placeholder="0" min="0" required>
                        </div>

                        <!-- Harga Jual -->
                        <div class="form-group">
                            <label class="form-label">Harga Jual (Rp) <span style="color:var(--danger)">*</span></label>
                            <input type="number" class="form-control" th:field="*{sellPrice}"
                                   placeholder="0" min="0" required>
                        </div>
                    </div>

                    <div class="grid-2">
                        <!-- Stok Min -->
                        <div class="form-group">
                            <label class="form-label">Stok Minimum</label>
                            <input type="number" class="form-control" th:field="*{minStock}"
                                   placeholder="5" min="0">
                            <small class="text-muted">Alert ketika stok ≤ nilai ini</small>
                        </div>

                        <!-- Satuan -->
                        <div class="form-group">
                            <label class="form-label">Satuan</label>
                            <select class="form-control" th:field="*{unit}">
                                <option value="pcs">Pcs</option>
                                <option value="kg">Kg</option>
                                <option value="liter">Liter</option>
                                <option value="dus">Dus</option>
                                <option value="lusin">Lusin</option>
                                <option value="gram">Gram</option>
                                <option value="botol">Botol</option>
                                <option value="pak">Pak</option>
                            </select>
                        </div>
                    </div>

                    <!-- Status (Edit only) -->
                    <div class="form-group" th:if="${product.id != null}">
                        <label class="form-label">Status</label>
                        <select class="form-control" th:field="*{isActive}">
                            <option value="true">Aktif</option>
                            <option value="false">Nonaktif</option>
                        </select>
                    </div>

                    <!-- Margin Preview -->
                    <div style="background: var(--background); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 16px;">
                        <div class="d-flex justify-between">
                            <span class="text-muted text-sm">Estimasi Margin:</span>
                            <span style="font-weight:700;color:var(--accent)" id="margin-preview">0%</span>
                        </div>
                        <div class="d-flex justify-between mt-1">
                            <span class="text-muted text-sm">Estimasi Laba/unit:</span>
                            <span style="font-weight:700;color:var(--accent)" id="profit-preview">Rp 0</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2" style="justify-content:flex-end">
                        <a th:href="@{/products}" class="btn btn-ghost">Batal</a>
                        <button type="submit" class="btn btn-primary">
                            💾 <span th:text="${product.id == null ? 'Simpan Produk' : 'Update Produk'}">Simpan</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<th:block th:fragment="scripts">
<script>
// Real-time margin calculation
const buyInput = document.querySelector('[name="buyPrice"]');
const sellInput = document.querySelector('[name="sellPrice"]');

function updateMargin() {
    const buy = parseFloat(buyInput?.value) || 0;
    const sell = parseFloat(sellInput?.value) || 0;
    const profit = sell - buy;
    const margin = buy > 0 ? ((profit / buy) * 100).toFixed(1) : 0;

    document.getElementById('margin-preview').textContent = margin + '%';
    document.getElementById('profit-preview').textContent = 'Rp ' + profit.toLocaleString('id-ID');

    const el = document.getElementById('margin-preview');
    el.style.color = margin >= 0 ? 'var(--accent)' : 'var(--danger)';
}

buyInput?.addEventListener('input', updateMargin);
sellInput?.addEventListener('input', updateMargin);
updateMargin();

function simulateScan() {
    const barcode = prompt('Simulasi scan barcode - Masukkan barcode:');
    if (barcode) {
        document.getElementById('barcode-input').value = barcode;
    }
}
</script>
</th:block>

</body>
</html>
