<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terjadi Kesalahan — Toko Karya Abadi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background-color: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .error-container {
            background: white;
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .error-code {
            font-size: 72px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-dark), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-message {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 8px;
        }
        .error-detail {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div style="font-size:48px;margin-bottom:16px">⚠️</div>
    <div class="error-code" th:text="${status ?: 'Error'}">404</div>
    <div class="error-message" th:text="${error ?: 'Terjadi Kesalahan'}">Halaman Tidak Ditemukan</div>
    <div class="error-detail" th:text="${message ?: 'Maaf, halaman yang Anda tuju tidak dapat diakses atau terjadi kendala sistem.'}">
        Detail error
    </div>
    
    <a th:href="@{/dashboard}" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">
        🏠 Kembali ke Dashboard
    </a>
</div>

</body>
</html>
